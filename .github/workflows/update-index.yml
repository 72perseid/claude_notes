name: Update Index

on:
  push:
    branches: [main]
    paths:
      - '*.html'

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rebuild index.html
        run: |
          echo '<!DOCTYPE html>' > index.html
          echo '<html lang="en">' >> index.html
          echo '<head><meta charset="UTF-8"><title>Index</title></head>' >> index.html
          echo '<body>' >> index.html
          echo '<h1>Pages</h1>' >> index.html
          echo '<ul>' >> index.html

          for file in $(ls *.html | sort | grep -v '^index.html$'); do
            label=$(echo "$file" | sed 's/\.html$//' | sed 's/[-_]/ /g')
            echo "  <li><a href=\"$file\">$label</a></li>" >> index.html
          done

          echo '</ul>' >> index.html
          echo '</body>' >> index.html
          echo '</html>' >> index.html

      - name: Commit updated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: update index [skip ci]"
          git push
